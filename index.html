<!DOCTYPE html> <html> <head> <meta charset="UTF-8"> <title>Dinosaurio Runner</title> <style> body{ text-align:center; font-family:Arial; } #game{ background:#f0f0f0; border:2px solid black; } </style> </head> <body> <h1>Dinosaurio Runner</h1> <canvas id="game" width="800" height="300"></canvas> <script> const canvas = document.getElementById("game"); const ctx = canvas.getContext("2d"); let dino = { x:50, y:220, width:40, height:40, velocidadY:0, saltando:false }; let cactus = { x:800, y:220, width:30, height:40 }; let gravedad = 0.8; let puntos = 0; let gameOver = false; document.addEventListener("keydown", function(e){ if(e.code === "Space" && !dino.saltando){ dino.velocidadY = -15; dino.saltando = true; } }); function actualizar(){ if(gameOver){ ctx.font = "40px Arial"; ctx.fillText("GAME OVER",250,120); return; } requestAnimationFrame(actualizar); ctx.clearRect(0,0,800,300); ctx.beginPath(); ctx.moveTo(0,260); ctx.lineTo(800,260); ctx.stroke(); dino.velocidadY += gravedad; dino.y += dino.velocidadY; if(dino.y >= 220){ dino.y = 220; dino.velocidadY = 0; dino.saltando = false; } cactus.x -= 6; if(cactus.x < -30){ cactus.x = 800; puntos++; } ctx.fillStyle = "green"; ctx.fillRect( dino.x, dino.y, dino.width, dino.height ); ctx.fillStyle = "red"; ctx.fillRect( cactus.x, cactus.y, cactus.width, cactus.height ); if( dino.x < cactus.x + cactus.width && dino.x + dino.width > cactus.x && dino.y < cactus.y + cactus.height && dino.y + dino.height > cactus.y ){ gameOver = true; } ctx.fillStyle = "black"; ctx.font = "25px Arial"; ctx.fillText("Puntos: " + puntos,20,30); } actualizar(); </script> </body> </html>
