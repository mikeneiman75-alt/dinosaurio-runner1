<!DOCTYPE html>

<html lang="es">
<head>
<meta charset="UTF-8">
<title>Dinosaurio Runner</title>

<style>
body{
    text-align:center;
    font-family:Arial, sans-serif;
    background:#f5f5f5;
}

#game{
    background:white;
    border:2px solid black;
}
</style>

</head>

<body>

<h1>🦖 Dinosaurio Runner</h1>

<canvas id="game" width="800" height="300"></canvas>

<script>

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let dino = {
    x:50,
    y:220,
    width:40,
    height:40,
    velocidadY:0,
    saltando:false
};

let cactus = {
    x:800,
    y:220,
    width:30,
    height:40
};

let gravedad = 0.8;
let puntos = 0;
let gameOver = false;

document.addEventListener("keydown", function(e){

    if(e.code === "Space" && !dino.saltando){

        dino.velocidadY = -15;
        dino.saltando = true;
    }
});

function actualizar(){

    if(gameOver){

        ctx.fillStyle = "red";
        ctx.font = "40px Arial";
        ctx.fillText("GAME OVER",250,120);

        ctx.fillStyle = "black";
        ctx.font = "25px Arial";
        ctx.fillText("Puntos: " + puntos,320,170);

        return;
    }

    requestAnimationFrame(actualizar);

    ctx.clearRect(0,0,800,300);

    // Sol
    ctx.fillStyle = "yellow";
    ctx.beginPath();
    ctx.arc(700,60,30,0,Math.PI*2);
    ctx.fill();

    // Nubes
    ctx.fillStyle = "#cccccc";
    ctx.fillRect(120,50,50,20);
    ctx.fillRect(150,40,50,20);

    ctx.fillRect(400,70,50,20);
    ctx.fillRect(430,60,50,20);

    // Piso
    ctx.beginPath();
    ctx.moveTo(0,260);
    ctx.lineTo(800,260);
    ctx.stroke();

    dino.velocidadY += gravedad;
    dino.y += dino.velocidadY;

    if(dino.y >= 220){
        dino.y = 220;
        dino.velocidadY = 0;
        dino.saltando = false;
    }

    cactus.x -= 6;

    if(cactus.x < -30){
        cactus.x = 800;
        puntos++;
    }

    // Dinosaurio
    ctx.fillStyle = "black";

    ctx.fillRect(dino.x, dino.y + 10, 40, 20);
    ctx.fillRect(dino.x + 25, dino.y, 15, 15);
    ctx.fillRect(dino.x - 10, dino.y + 15, 10, 5);
    ctx.fillRect(dino.x + 5, dino.y + 30, 5, 10);
    ctx.fillRect(dino.x + 25, dino.y + 30, 5, 10);

    ctx.fillStyle = "white";
    ctx.fillRect(dino.x + 32, dino.y + 4, 2, 2);

    // Cactus
    ctx.fillStyle = "green";

    ctx.fillRect(cactus.x + 10, cactus.y, 10, 40);
    ctx.fillRect(cactus.x, cactus.y + 10, 10, 5);
    ctx.fillRect(cactus.x + 20, cactus.y + 20, 10, 5);

    // Colisión
    if(
        dino.x < cactus.x + cactus.width &&
        dino.x + dino.width > cactus.x &&
        dino.y < cactus.y + cactus.height &&
        dino.y + dino.height > cactus.y
    ){
        gameOver = true;
    }

    // Puntos
    ctx.fillStyle = "black";
    ctx.font = "25px Arial";
    ctx.fillText("Puntos: " + puntos,20,30);
}

actualizar();

</script>

</body>
</html>
